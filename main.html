<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubi-Doo-Be-Doo! | Proposal Business Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-orange-50 text-gray-800">

    <nav class="bg-white/90 sticky top-0 z-50 backdrop-blur-md shadow-sm border-b border-orange-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-black text-orange-600 tracking-tighter italic">UBI-DOO-BE-DOO!</a>
            
            <button onclick="toggleCart()" class="relative bg-orange-100 p-3 rounded-2xl text-orange-600 hover:scale-105 active:scale-95 transition-all">
                <i class="fas fa-shopping-basket text-lg"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full h-5 w-5 flex items-center justify-center font-bold border-2 border-white">0</span>
            </button>
        </div>
    </nav>

    <section class="pt-16 pb-20 px-6">
        <div class="container mx-auto flex flex-col md:flex-row items-center gap-12">
            <div class="md:w-3/5 text-center md:text-left">
                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">Tradisi Betawi <span class="text-orange-500 italic">Modern</span></h1>
                <p class="text-gray-500 italic mb-10">Inovasi Es Bubur Chacha Pelangi Kelompok 21 - SMKN 22 Jakarta.</p>
                <a href="#menu" class="bg-orange-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg uppercase tracking-widest text-xs">Cek Menu</a>
            </div>
            <div class="md:w-2/5 flex justify-center">
                <img src="https://raw.githubusercontent.com/MrLowPr/image/main/assets2.jpg" class="w-72 h-72 object-contain rounded-full border-[12px] border-white shadow-2xl bg-white">
            </div>
        </div>
    </section>

    <section id="menu" class="py-20 bg-white">
        <div class="container mx-auto px-6">
            <div class="max-w-md mx-auto bg-orange-50 p-8 rounded-[3rem] shadow-xl border border-orange-100">
                <h3 class="text-2xl font-black mb-2">Ubi-Doo-Be-Doo!</h3>
                <p class="text-gray-500 text-sm mb-8 italic">Ubi ungu, kuning, sagu mutiara, dan jelly pelangi.</p>
                <div class="flex items-center justify-between">
                    <span class="text-2xl font-black">Rp 15.000</span>
                    <button onclick="addToCart()" class="bg-orange-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-700 transition-all active:scale-95">Beli +</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-10 text-center">
        <p class="text-[10px] font-bold tracking-[0.3em] opacity-50">&copy; 2026 KELOMPOK 21 SMKN 22 JAKARTA</p>
    </footer>

    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/60 z-[60] hidden backdrop-blur-sm"></div>
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[400px] bg-white z-[70] translate-x-full sidebar-transition flex flex-col shadow-2xl">
        <div class="p-8 bg-orange-600 text-white flex justify-between items-center">
            <h3 class="font-black text-xl uppercase italic">Keranjang Belanja</h3>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-grow p-8 overflow-y-auto">
            </div>

        <div class="p-8 border-t bg-gray-50">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-gray-400">TOTAL:</span>
                <span id="cart-total" class="text-3xl font-black text-orange-600">Rp 0</span>
            </div>
            <select id="admin-wa" class="w-full p-4 rounded-xl border-2 border-orange-100 mb-4 font-bold outline-none">
                <option value="6281212450296">Admin 1 (Nabila)</option>
                <option value="6283125431765">Admin 2 (Adan)</option>
            </select>
            <button onclick="checkout()" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-green-100">Kirim ke WhatsApp</button>
        </div>
    </div>

    <script>
        let count = 0;
        const price = 15000;

        function updateUI() {
            // Update angka di icon basket
            document.getElementById('cart-count').innerText = count;
            
            // Update isi sidebar
            const itemsContainer = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            
            if (count === 0) {
                itemsContainer.innerHTML = '<p class="text-center text-gray-300 mt-20 italic">Keranjang masih kosong...</p>';
            } else {
                itemsContainer.innerHTML = `
                    <div class="bg-orange-50 p-6 rounded-3xl border border-orange-100 flex justify-between items-center">
                        <div>
                            <p class="font-black italic text-gray-800">Ubi-Doo-Be-Doo!</p>
                            <p class="text-xs text-orange-500 font-bold">Rp 15.000 / porsi</p>
                        </div>
                        <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-xl shadow-sm">
                            <button onclick="removeOne()" class="font-bold text-orange-600">-</button>
                            <span class="font-black text-lg">${count}</span>
                            <button onclick="addToCart()" class="font-bold text-orange-600">+</button>
                        </div>
                    </div>
                `;
            }
            totalDisplay.innerText = "Rp " + (count * price).toLocaleString('id-ID');
        }

        function addToCart() {
            count++;
            updateUI();
        }

        function removeOne() {
            if (count > 0) count--;
            updateUI();
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            sidebar.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function checkout() {
            if (count === 0) return alert("Keranjang kosong!");
            const phone = document.getElementById('admin-wa').value;
            const msg = `Halo Admin! Saya mau pesan Ubi-Doo-Be-Doo sebanyak ${count} porsi. Total: Rp ${(count * price).toLocaleString('id-ID')}`;
            window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}`, '_blank');
        }

        // SHORTCUT RAHASIA: SHIFT + ALT
        document.addEventListener('keydown', function(e) {
            if (e.shiftKey && e.altKey) {
                window.location.href = "main2.html";
            }
        });

        // Jalankan UI pertama kali
        updateUI();
    </script>
</body>
</html>
